<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="BrewWater helps you create and save coffee brew-water recipes and water profiles."
    >
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png">
    <title>BrewWater</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f7f4ef;
        --text: #25211c;
        --muted: #6f675d;
        --rule: #ded6ca;
        --focus: #2e6f73;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #151412;
          --text: #f1ece5;
          --muted: #b7aa9d;
          --rule: #3a352f;
          --focus: #7cc9c9;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family:
          -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display",
          system-ui, sans-serif;
        line-height: 1.5;
      }

      main {
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 32px 20px;
      }

      .landing {
        display: flex;
        width: min(100%, 480px);
        flex-direction: column;
        align-items: center;
        text-align: center;
      }

      .app-icon {
        width: clamp(96px, 28vw, 148px);
        height: clamp(96px, 28vw, 148px);
        border-radius: 27%;
        box-shadow:
          0 24px 60px rgb(0 0 0 / 16%),
          0 1px 2px rgb(0 0 0 / 12%);
      }

      h1 {
        margin: 28px 0 10px;
        font-size: clamp(2.6rem, 12vw, 5rem);
        font-weight: 750;
        letter-spacing: 0;
        line-height: 0.95;
      }

      .tagline {
        max-width: 30rem;
        margin: 0 0 28px;
        color: var(--muted);
        font-size: clamp(1.02rem, 3vw, 1.18rem);
      }

      .app-store-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        text-decoration: none;
      }

      .app-store-badge:focus-visible,
      .privacy-link:focus-visible {
        outline: 3px solid var(--focus);
        outline-offset: 4px;
      }

      .app-store-badge img {
        display: block;
        width: 180px;
        max-width: 100%;
        height: auto;
      }

      footer {
        margin-top: 40px;
        color: var(--muted);
        font-size: 0.95rem;
      }

      .privacy-link {
        color: inherit;
        text-decoration-color: var(--rule);
        text-decoration-thickness: 0.08em;
        text-underline-offset: 0.2em;
      }

      @media (max-width: 420px) {
        main {
          padding-inline: 18px;
        }

        .app-store-badge {
          max-width: 220px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="landing" aria-labelledby="app-title">
        <img
          class="app-icon"
          src="assets/BrewWater.png"
          width="512"
          height="512"
          alt="BrewWater app icon"
        >
        <h1 id="app-title">BrewWater</h1>
        <p class="tagline">
          Coffee brew-water recipes and water profiles, kept simple.
        </p>

        <a
          class="app-store-badge"
          href="https://apps.apple.com/app/id6759792840"
          aria-label="Download BrewWater on the App Store"
        >
          <picture>
            <source
              srcset="assets/app-store-badge-white.svg"
              media="(prefers-color-scheme: dark)"
            >
            <img
              src="assets/app-store-badge-black.svg"
              width="120"
              height="40"
              alt="Download on the App Store"
            >
          </picture>
        </a>

        <footer>
          <a class="privacy-link" href="privacy-policy/">Privacy Policy</a>
        </footer>
      </section>
    </main>
  </body>
</html>
