<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="BrewWater helps you create and save coffee brew-water recipes and water profiles."
    >
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png">
    <title>BrewWater</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f7f4ef;
        --text: #25211c;
        --muted: #6f675d;
        --rule: #ded6ca;
        --badge-bg: #0c0c0d;
        --badge-text: #ffffff;
        --focus: #2e6f73;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #151412;
          --text: #f1ece5;
          --muted: #b7aa9d;
          --rule: #3a352f;
          --badge-bg: #f6f2ec;
          --badge-text: #141210;
          --focus: #7cc9c9;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family:
          -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display",
          system-ui, sans-serif;
        line-height: 1.5;
      }

      main {
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 32px 20px;
      }

      .landing {
        display: flex;
        width: min(100%, 480px);
        flex-direction: column;
        align-items: center;
        text-align: center;
      }

      .app-icon {
        width: clamp(96px, 28vw, 148px);
        height: clamp(96px, 28vw, 148px);
        border-radius: 27%;
        box-shadow:
          0 24px 60px rgb(0 0 0 / 16%),
          0 1px 2px rgb(0 0 0 / 12%);
      }

      h1 {
        margin: 28px 0 10px;
        font-size: clamp(2.6rem, 12vw, 5rem);
        font-weight: 750;
        letter-spacing: 0;
        line-height: 0.95;
      }

      .tagline {
        max-width: 30rem;
        margin: 0 0 28px;
        color: var(--muted);
        font-size: clamp(1.02rem, 3vw, 1.18rem);
      }

      .app-store-badge {
        display: inline-flex;
        min-width: 178px;
        height: 56px;
        align-items: center;
        justify-content: center;
        gap: 10px;
        border: 1px solid rgb(255 255 255 / 18%);
        border-radius: 8px;
        background: var(--badge-bg);
        color: var(--badge-text);
        text-decoration: none;
        transition:
          transform 160ms ease,
          box-shadow 160ms ease;
      }

      .app-store-badge:hover {
        transform: translateY(-1px);
        box-shadow: 0 14px 34px rgb(0 0 0 / 14%);
      }

      .app-store-badge:focus-visible,
      .privacy-link:focus-visible {
        outline: 3px solid var(--focus);
        outline-offset: 4px;
      }

      .apple-mark {
        width: 24px;
        height: 29px;
        flex: 0 0 auto;
        fill: currentColor;
      }

      .badge-copy {
        display: grid;
        gap: 1px;
        text-align: left;
      }

      .badge-small {
        font-size: 0.68rem;
        line-height: 1;
      }

      .badge-large {
        font-size: 1.24rem;
        font-weight: 650;
        line-height: 1;
      }

      footer {
        margin-top: 40px;
        color: var(--muted);
        font-size: 0.95rem;
      }

      .privacy-link {
        color: inherit;
        text-decoration-color: var(--rule);
        text-decoration-thickness: 0.08em;
        text-underline-offset: 0.2em;
      }

      @media (max-width: 420px) {
        main {
          padding-inline: 18px;
        }

        .app-store-badge {
          width: 100%;
          max-width: 220px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="landing" aria-labelledby="app-title">
        <img
          class="app-icon"
          src="assets/BrewWater.png"
          width="512"
          height="512"
          alt="BrewWater app icon"
        >
        <h1 id="app-title">BrewWater</h1>
        <p class="tagline">
          Coffee brew-water recipes and water profiles, kept simple.
        </p>

        <!--
          Re-enable when BrewWater is live on the App Store.

          <a
            class="app-store-badge"
            href="https://apps.apple.com/"
            aria-label="Download BrewWater on the App Store"
          >
            <svg class="apple-mark" viewBox="0 0 24 29" aria-hidden="true">
              <path d="M19.5 15.3c0-3.3 2.7-4.9 2.8-5-1.5-2.3-3.9-2.6-4.8-2.6-2-.2-3.9 1.2-5 1.2-1 0-2.6-1.2-4.3-1.1-2.2 0-4.3 1.3-5.4 3.3-2.3 4-.6 9.8 1.6 13 1.1 1.6 2.4 3.3 4.1 3.2 1.7-.1 2.3-1.1 4.3-1.1s2.6 1.1 4.4 1c1.8 0 2.9-1.6 4-3.2 1.3-1.8 1.8-3.6 1.8-3.7-.1 0-3.5-1.3-3.5-5Zm-3.3-9.7c.9-1.1 1.5-2.6 1.3-4.1-1.3.1-2.8.8-3.7 1.9-.8 1-1.6 2.6-1.4 4 1.5.1 2.9-.7 3.8-1.8Z"/>
            </svg>
            <span class="badge-copy">
              <span class="badge-small">Download on the</span>
              <span class="badge-large">App Store</span>
            </span>
          </a>
        -->

        <footer>
          <a class="privacy-link" href="privacy-policy/">Privacy Policy</a>
        </footer>
      </section>
    </main>
  </body>
</html>
